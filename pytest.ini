[pytest]
# Hypothesis配置
hypothesis_profile = default

# 测试发现
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出选项
addopts = 
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# 标记定义
markers =
    slow: 标记为慢速测试
    integration: 标记为集成测试
    unit: 标记为单元测试
    property: 标记为属性测试
